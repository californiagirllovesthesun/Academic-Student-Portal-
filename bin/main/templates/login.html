<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Student Portal - Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .glass-card {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.15);
        }
    </style>
</head>
<body class="min-h-screen w-screen m-0 flex items-center justify-center bg-cover bg-center bg-no-repeat bg-fixed relative overflow-hidden font-sans text-slate-100"
      style="background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&w=1920');">

    <div class="absolute inset-0 bg-gradient-to-b from-slate-950/60 via-blue-950/20 to-slate-950/70 pointer-events-none z-0"></div>

    <div class="absolute inset-0 bg-cover bg-center opacity-30 mix-blend-screen pointer-events-none z-5"
         style="background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?q=80&w=1000');"></div>

    <div class="w-full max-w-[440px] p-10 mx-4 rounded-2xl glass-card text-center relative z-10 transition-all duration-300">
        
        <h1 class="text-2xl font-bold tracking-widest uppercase mb-1 text-white drop-shadow-[0_2px_10px_rgba(255,255,255,0.1)]">
            Academic Student<br>Portal
        </h1>

        <th:block th:if="${error}">
            <div class="my-4 p-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-300 text-xs text-left flex items-center gap-2">
                <span th:text="${error}">Invalid credentials.</span>
            </div>
        </th:block>

        <form th:action="@{/portal/login}" method="POST" class="space-y-5 text-left mt-8">
            <div>
                <label class="block text-xs font-medium tracking-wide text-slate-300 mb-1.5">Email / Username</label>
                <div class="relative">
                    <input type="text" name="username" required autofocus
                           class="w-full px-4 py-3 rounded-xl bg-slate-950/50 border border-slate-700/60 focus:border-blue-400 focus:outline-none transition text-sm text-white placeholder-slate-500"
                           placeholder="katiecarlson@mac.com">
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium tracking-wide text-slate-300 mb-1.5">Password</label>
                <div class="relative">
                    <input type="password" name="password" required
                           class="w-full px-4 py-3 rounded-xl bg-slate-950/50 border border-slate-700/60 focus:border-blue-400 focus:outline-none transition text-sm text-white placeholder-slate-500"
                           placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                    class="w-full mt-2 py-3.5 px-4 rounded-xl bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-semibold text-sm shadow-md shadow-blue-500/20 transition-all active:scale-[0.99] cursor-pointer">
                Log In
            </button>
        </form>

        <div class="mt-5 text-xs text-slate-400 space-y-3">
            <div>
                <a href="#" class="hover:text-slate-200 transition">Forgot Password?</a>
            </div>
            <div class="pt-2 text-slate-400 border-t border-slate-800/60">
                Don't have an account? <a th:href="@{/portal/register}" class="text-white font-semibold hover:underline ml-1">Sign up</a>
            </div>
        </div>

    </div>
</body>
</html>

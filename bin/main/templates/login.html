<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Academic Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-br from-blue-900 to-indigo-950 flex items-center justify-center min-h-screen">
    <div class="bg-white/10 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md border border-white/20 text-white">
        <h2 class="text-3xl font-extrabold text-center tracking-tight mb-2">University Portal</h2>
        <p class="text-blue-200 text-center text-sm mb-6">Welcome back! Please sign in.</p>
        
        <div th:if="${error}" class="bg-red-500/20 border border-red-500 text-red-200 text-sm p-3 rounded-lg text-center mb-4" th:text="${error}"></div>
        <div th:if="${success}" class="bg-green-500/20 border border-green-500 text-green-200 text-sm p-3 rounded-lg text-center mb-4" th:text="${success}"></div>

        <form action="/portal/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-blue-200 mb-1">Username</label>
                <input type="text" name="username" required class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-blue-200 mb-1">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition">
            </div>
            <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 font-bold py-3 px-4 rounded-xl shadow-lg transition active:scale-98 cursor-pointer mt-2">Sign In</button>
        </form>
        <p class="text-center text-xs text-blue-200 mt-6">Don't have an account? <a href="/portal/register" class="text-blue-400 font-semibold hover:underline">Create User</a></p>
    </div>
</body>
</html>

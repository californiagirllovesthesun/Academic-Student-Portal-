<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <style>
        body { background-image: url('https://i.postimg.cc/wBcXd70w/loginacademicpage.jpg'); background-size: 300px; background-repeat: repeat; }
    </style>
</head>
<body class="text-white">
    <form action="/portal/save-profile" method="POST">
        <input type="hidden" name="username" th:value="">
        <input type="text" name="email" placeholder="Email Address" class="text-black">
        <input type="text" name="phone" placeholder="Phone Number" class="text-black">
        <button type="submit" class="bg-indigo-600 px-4 py-2">Save Changes</button>
    </form>
</body>
</html>

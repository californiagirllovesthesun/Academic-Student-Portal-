<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Student Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; background-image: url('https://i.postimg.cc/wBcXd70w/loginacademicpage.jpg'); background-size: cover; background-position: center; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="glass p-8 rounded-3xl w-full max-w-[400px] text-white">
        <h2 class="text-2xl font-bold mb-6 text-center">CREATE ACCOUNT</h2>
        <form th:action="@{/register}" method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="Username" class="w-full p-3 bg-white/10 rounded">
            <input type="password" name="password" placeholder="Password" class="w-full p-3 bg-white/10 rounded">
            <button class="w-full py-3 bg-blue-600 rounded hover:bg-blue-500 font-bold">Sign Up</button>
        </form>
    </div>
</body>
</html>

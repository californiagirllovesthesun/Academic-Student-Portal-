# Spring Application Name
spring.application.name=demo

# Configure In-Memory H2 Database for Cloud Deployment Fallback
spring.datasource.url=jdbc:h2:mem:academic_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration (Optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate/JPA Settings to Automatically Create Tables in Memory
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Allow Thymeleaf templates to refresh without restarting the app
spring.thymeleaf.cache=false

# Multipart File Upload Limits (Allows up to 5MB profile pictures)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Core Application Settings
spring.application.name=academic-student-portal
spring.thymeleaf.cache=false

# H2 Database Configuration Fallback
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# Multipart File Upload Limits (Allows up to 5MB profile pictures)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.port=${PORT:8080}
# Ensures Spring Boot binds to the dynamic port assigned by Render
server.port=${PORT:8080}
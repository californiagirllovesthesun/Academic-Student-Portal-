<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Academic Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gradient-to-br from-indigo-900 to-slate-950 flex items-center justify-center min-h-screen">
    <div class="bg-white/10 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-md border border-white/20 text-white">
        <h2 class="text-3xl font-extrabold text-center tracking-tight mb-2">Create Account</h2>
        <p class="text-indigo-200 text-center text-sm mb-6">Join the academic student portal</p>
        
        <div th:if="${error}" class="bg-red-500/20 border border-red-500 text-red-200 text-sm p-3 rounded-lg text-center mb-4" th:text="${error}"></div>

        <form action="/portal/register" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-indigo-200 mb-1">Desired Username</label>
                <input type="text" name="username" required class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-indigo-200 mb-1">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-indigo-200 mb-1">Portal Role</label>
                <select name="role" class="w-full px-4 py-2.5 bg-slate-800 border border-white/10 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-indigo-400 transition">
                    <option value="STUDENT">Student</option>
                    <option value="INSTRUCTOR">Instructor</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-indigo-500 hover:bg-indigo-600 font-bold py-3 px-4 rounded-xl shadow-lg transition active:scale-98 cursor-pointer mt-2">Register User</button>
        </form>
        <p class="text-center text-xs text-indigo-200 mt-6">Already have an account? <a href="/portal/login" class="text-indigo-400 font-semibold hover:underline">Sign In</a></p>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white flex justify-center items-center h-screen">
    <div class="bg-slate-900 p-8 rounded-2xl border border-white/10 shadow-2xl w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-cyan-400">CREATE ACCOUNT</h2>
        <form action="/register" method="post" class="space-y-4">
            <input type="text" name="username" placeholder="Username" class="w-full p-3 bg-white/5 border border-white/10 rounded-lg" required>
            <input type="password" name="password" placeholder="Password" class="w-full p-3 bg-white/5 border border-white/10 rounded-lg" required>
            <input type="text" name="fullName" placeholder="Full Name" class="w-full p-3 bg-white/5 border border-white/10 rounded-lg">
            <input type="email" name="email" placeholder="University Email" class="w-full p-3 bg-white/5 border border-white/10 rounded-lg">
            <select name="role" class="w-full p-3 bg-white/5 border border-white/10 rounded-lg">
                <option value="STUDENT">Student</option>
                <option value="INSTRUCTOR">Instructor</option>
            </select>
            <button type="submit" class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 rounded-lg font-bold transition">Sign Up</button>
        </form>
        <a href="/portal/login" class="block text-center mt-4 text-sm text-slate-400 hover:underline">Back to Login</a>
    </div>
</body>
</html>

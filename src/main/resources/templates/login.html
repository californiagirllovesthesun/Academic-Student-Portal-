<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Student Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            /* Using a high-reliability direct path */
            background-image: url('https://i.postimg.cc/wBcXd70w/loginacademicpage.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0f172a; /* Deep space fallback */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="glass-card p-8 rounded-2xl w-full max-w-[400px] text-center shadow-2xl">
        <h1 class="text-xl font-bold text-white mb-6 uppercase tracking-wider">Academic Student<br>Portal</h1>
        <form th:action="@{/portal/login}" method="POST" class="space-y-4 text-left">
            <div>
                <label class="block text-xs text-slate-400 mb-1">Email / Username</label>
                <input type="text" name="username" class="w-full p-3 rounded-lg bg-white/10 text-white border border-white/5">
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1">Password</label>
                <input type="password" name="password" class="w-full p-3 rounded-lg bg-white/10 text-white border border-white/5">
            </div>
            <button class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-bold">Log In</button>
        </form>
    </div>
</body>
</html>

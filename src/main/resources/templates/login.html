<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Portal Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-image: url('https://i.postimg.cc/wBcXd70w/loginacademicpage.jpg');
            background-size: 300px; background-repeat: repeat;
        }
        .gold-card {
            background: rgba(0, 0, 0, 0.6);
            /* Thicker gold border */
            border: 4px solid #FFD700;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="gold-card p-8 rounded-2xl shadow-2xl w-96 text-center">
        <h1 class="text-2xl font-bold mb-6 text-white">Academic Portal Login</h1>
        <form th:action="@{/portal/login}" method="post" class="space-y-4">
            <input type="text" name="username" placeholder="Username" class="w-full p-2 rounded bg-black/50 border border-white/20 text-white">
            <input type="password" name="password" placeholder="Password" class="w-full p-2 rounded bg-black/50 border border-white/20 text-white">
            <button type="submit" class="w-full py-2 border border-white rounded font-bold hover:bg-[#FFD700] hover:text-black transition text-white">Sign In</button>
        
        
        <a th:href="@{/portal/register}" class="block mt-4 w-full py-2 border border-white rounded font-bold hover:bg-[#FFD700] hover:text-black transition text-white">Create Account</a>
    </div>
</body>
</html>

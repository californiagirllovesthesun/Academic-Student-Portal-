<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Academic Portal Login</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; color: #fff; }
        .login-box { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #444; }
        input { display: block; margin: 10px 0; padding: 8px; width: 200px; }
        button { padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <form action="/portal/login" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>

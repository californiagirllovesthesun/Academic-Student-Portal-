<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Student Portal - Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        body {
            /* This ensures the full image is shown, not just a cropped center */
            background-image: url('https://i.postimg.cc/wBcXd70w/loginacademicpage.jpg');
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            background-color: #020617; /* Matches the deep space black */
        }
    </style>
</head>
<body class="min-h-screen w-screen flex items-center justify-center font-sans text-slate-100">

    <div class="w-full max-w-[400px] p-8 rounded-3xl glass-card text-center z-10">
        <h1 class="text-xl font-bold tracking-widest uppercase mb-6 text-white">
            ACADEMIC STUDENT<br>PORTAL
        </h1>

        <form th:action="@{/portal/login}" method="POST" class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1">Email / Username</label>
                <input type="text" name="username" required 
                       class="w-full px-4 py-2.5 rounded-lg bg-white/5 border border-white/10 text-white text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1">Password</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-2.5 rounded-lg bg-white/5 border border-white/10 text-white text-sm">
            </div>
            <button type="submit" 
                    class="w-full py-2.5 mt-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm transition">
                Log In
            </button>
        </form>

        <div class="mt-6 text-xs text-slate-500">
            <a href="#" class="hover:text-slate-300">Forgot Password?</a>
            <p class="mt-2">Don't have an account? <a th:href="@{/portal/register}" class="text-white font-bold hover:underline">Sign up</a></p>
        </div>
    </div>
</body>
</html>

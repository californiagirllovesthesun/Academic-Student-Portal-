<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Student Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
       <style>
    body {
        background-image: url('https://i.postimg.cc/wBcXd70w/loginacademicpage.jpg');
        /* 'cover' keeps the image aspect ratio intact so it doesn't look blurry/stretched */
        background-size: cover;
        /* 'center' ensures the most important part of the cap stays in view */
        background-position: center center;
        background-repeat: no-repeat;
        height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    .glass-card {
        background: rgba(15, 23, 42, 0.45);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
</style>
</head>
<body>
    <div class="glass-card p-8 rounded-2xl text-center shadow-2xl">
        <h1 class="text-2xl font-bold text-white mb-6 uppercase tracking-wider">Academic Student<br>Portal</h1>
        <form th:action="@{/portal/login}" method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="katie" class="w-full p-3 rounded-lg bg-white/10 text-white placeholder-slate-400">
            <input type="password" name="password" placeholder="••••••••" class="w-full p-3 rounded-lg bg-white/10 text-white placeholder-slate-400">
            <button class="w-full p-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-bold">Log In</button>
        </form>
    </div>
</body>
</html>

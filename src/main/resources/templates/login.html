<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Portal - Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#0b0f19] min-h-screen flex items-center justify-center relative overflow-hidden font-sans text-slate-200">

    <div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] rounded-full bg-blue-600/20 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-25%] right-[-10%] w-[600px] h-[600px] rounded-full bg-indigo-500/15 blur-[150px] pointer-events-none"></div>

    <div class="w-full max-w-md p-8 mx-4 rounded-2xl glass-panel shadow-2xl relative z-10 transition-all duration-300 hover:border-slate-500/20">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-300 bg-clip-text text-transparent">
                Academic Portal
            </h1>
            <p class="text-sm text-slate-400 mt-2">Sign in to access your student or instructor dashboard</p>
        </div>

        <th:block th:if="${error}">
            <div class="mb-5 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
                <span th:text="${error}">Invalid username or password.</span>
            </div>
        </th:block>

        <form th:action="@{/portal/login}" method="POST" class="space-y-6">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Username</label>
                <input type="text" name="username" required autofocus
                       class="w-full px-4 py-3 rounded-xl bg-slate-950/40 border border-slate-800 focus:border-blue-500 focus:bg-slate-950/60 focus:outline-none transition-all duration-200 text-sm text-slate-100 placeholder-slate-600"
                       placeholder="Enter your username">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 rounded-xl bg-slate-950/40 border border-slate-800 focus:border-blue-500 focus:bg-slate-950/60 focus:outline-none transition-all duration-200 text-sm text-slate-100 placeholder-slate-600"
                       placeholder="••••••••">
            </div>

            <button type="submit" 
                    class="w-full py-3.5 px-4 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold text-sm shadow-lg shadow-blue-600/20 active:scale-[0.99] transition-all duration-150 cursor-pointer">
                Sign In
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-800/60 text-center text-xs text-slate-500">
            Need an account? <a th:href="@{/portal/register}" class="text-blue-400 hover:underline font-medium ml-1">Register here</a>
        </div>

    </div>
</body>
</html>

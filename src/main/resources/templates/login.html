<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Student Portal - Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .glass-card {
            background: rgba(15, 23, 42, 0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="min-h-screen w-screen m-0 flex items-center justify-center bg-cover bg-center bg-no-repeat bg-fixed relative overflow-hidden font-sans text-slate-100"
      style="background-image: url('https://i.postimg.cc/wBcXd70w/loginacademicpage.jpg');">

    <div class="w-full max-w-[430px] p-9 mx-4 rounded-2xl glass-card text-center relative z-10 mt-6">
        
        <h1 class="text-2xl font-bold tracking-wider uppercase mb-8 text-white">
            ACADEMIC STUDENT<br>PORTAL
        </h1>

        <th:block th:if="${error}">
            <div class="my-3 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-300 text-xs text-left">
                <span th:text="${error}">Invalid credentials.</span>
            </div>
        </th:block>

        <form th:action="@{/portal/login}" method="POST" class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-semibold text-slate-300 mb-1.5 ml-1">Email / Username</label>
                <input type="text" name="username" required autofocus
                       class="w-full px-4 py-3 rounded-xl bg-[#eef2ff] border-0 focus:outline-none text-sm text-slate-900 placeholder-slate-400 font-medium"
                       placeholder="katie">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-300 mb-1.5 ml-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 rounded-xl bg-[#eef2ff] border-0 focus:outline-none text-sm text-slate-900 font-medium"
                       placeholder="••••••••••••">
            </div>

            <button type="submit" 
                    class="w-full mt-4 py-3.5 px-4 rounded-xl bg-[#2563eb] hover:bg-[#1d4ed8] text-white font-bold text-sm transition-all active:scale-[0.99] cursor-pointer shadow-lg shadow-blue-600/20">
                Log In
            </button>
        </form>

        <div class="mt-6 text-xs text-slate-300 space-y-3">
            <div>
                <a href="#" class="hover:underline transition text-slate-400">Forgot Password?</a>
            </div>
            <div class="pt-4 text-slate-400 border-t border-white/5">
                Don't have an account? <a th:href="@{/portal/register}" class="text-white font-bold hover:underline ml-1">Sign up</a>
            </div>
        </div>

    </div>
</body>
</html>

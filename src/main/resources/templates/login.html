<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Student Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-image: url('https://i.postimg.cc/wBcXd70w/loginacademicpage.jpg');
            /* Forces the image to stretch to the exact dimensions of the browser window */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 400px;
        }
    </style>
</head>
<body>
    <div class="glass-card p-8 rounded-2xl text-center shadow-2xl">
        <h1 class="text-2xl font-bold text-white mb-6 uppercase tracking-wider">Academic Student<br>Portal</h1>
        <form th:action="@{/portal/login}" method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="katie" class="w-full p-3 rounded-lg bg-white/10 text-white placeholder-slate-400">
            <input type="password" name="password" placeholder="••••••••" class="w-full p-3 rounded-lg bg-white/10 text-white placeholder-slate-400">
            <button class="w-full p-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-bold">Log In</button>
        </form>
    </div>
</body>
</html>

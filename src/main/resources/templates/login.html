<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Academic Portal Login</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; color: #fff; }
        .login-box { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #444; text-align: center; }
        input { display: block; margin: 10px auto; padding: 8px; width: 200px; }
        button { padding: 8px 15px; cursor: pointer; }
        a { color: #aaa; text-decoration: none; font-size: 0.9em; margin-top: 15px; display: block; }
    </style>
</head>
<body class="min-h-screen w-screen bg-cover bg-center bg-no-repeat bg-fixed flex items-center justify-center" style="background-image: url('/images/login-bg.png');">
    <div class="login-box">
        <h2>Login</h2>
        <form action="/portal/login" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        <a href="/portal/register">Create Account</a>
    </div>
</body>
</html>

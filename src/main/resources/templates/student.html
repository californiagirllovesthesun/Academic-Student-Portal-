<<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <style>
        body { 
            background-image: url('https://i.postimg.cc/wBcXd70w/loginacademicpage.jpg'); 
            background-size: cover; 
            background-attachment: fixed;
            font-family: sans-serif;
            color: white;
        }
        .form-container { background: rgba(0,0,0,0.7); padding: 20px; width: 300px; margin: 50px auto; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Update Profile</h2>
        <form action="/portal/save-profile" method="POST">
            <input type="hidden" name="username" th:value="${username}">
            
            <input type="text" name="email" placeholder="Email Address" class="text-black" style="display:block; margin-bottom:10px;">
            <input type="text" name="phone" placeholder="Phone Number" class="text-black" style="display:block; margin-bottom:10px;">
            
            <button type="submit" class="bg-indigo-600 px-4 py-2" style="cursor:pointer;">Save Changes</button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Academic Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen w-screen m-0 p-6 flex items-center justify-center bg-cover bg-center bg-no-repeat bg-fixed text-white"
      th:style="'background-image: url(' + @{/images/student-bg.png} + ');'">

    <div class="w-full max-w-4xl p-8 rounded-2xl border border-white/20 bg-white/10 backdrop-blur-md shadow-2xl space-y-8">
        
        <div class="flex flex-col md:flex-row items-center justify-between border-b border-white/10 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-wider uppercase">Student Home</h1>
                <p class="text-white/70">Academic Year: 2026</p>
            </div>
            <div class="flex items-center gap-4 bg-white/5 p-4 rounded-xl border border-white/10 w-full md:w-auto">
                <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center text-xl font-bold">
                    👤
                </div>
                <div>
                    <p class="text-sm text-white/60">Logged in as</p>
                    <p class="font-semibold text-cyan-400">katiecarlson</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-black/20 p-6 rounded-xl border border-white/10 space-y-4">
                <h2 class="text-xl font-semibold tracking-wide text-cyan-300 border-b border-white/10 pb-2">Registered Classes</h2>
                <div class="space-y-3">
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg">
                        <span>Cosmic Architecture 101</span>
                        <span class="font-bold text-emerald-400">A-</span>
                    </div>
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg">
                        <span>Intro to Base64 Photo Storage</span>
                        <span class="font-bold text-emerald-400">B</span>
                    </div>
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg">
                        <span>Gradle Permissions & Deployment</span>
                        <span class="font-bold text-emerald-400">A+</span>
                    </div>
                </div>
            </div>

            <div class="bg-black/20 p-6 rounded-xl border border-white/10 space-y-4">
                <h2 class="text-xl font-semibold tracking-wide text-purple-300 border-b border-white/10 pb-2">Upcoming Deadlines</h2>
                <div class="space-y-3">
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg">
                        <span>Tailwind Styling Project</span>
                        <span class="text-sm text-white/60">June 25</span>
                    </div>
                    <div class="flex justify-between items-center bg-white/5 p-3 rounded-lg">
                        <span>Final Exam: Credentials</span>
                        <span class="text-sm text-white/60">July 2</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>

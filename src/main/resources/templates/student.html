<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Academic Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen w-screen m-0 p-6 flex items-center justify-center bg-cover bg-center bg-no-repeat bg-fixed text-white"
      style="background-image: url('https://images.unsplash.com/photo-1543722530-d2c3201371e7?auto=format&fit=crop&w=1920&q=100');">

    <div class="absolute inset-0 bg-slate-950/50 backdrop-blur-xs pointer-events-none z-0"></div>

    <div class="w-full max-w-6xl p-8 rounded-2xl border border-white/10 bg-slate-900/40 backdrop-blur-md shadow-2xl space-y-6 relative z-10">
        <div class="flex justify-between items-center bg-indigo-500/10 border border-indigo-500/20 p-4 rounded-xl">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🚀</span>
                <span class="text-lg font-bold tracking-wider uppercase text-indigo-300">Student Terminal</span>
            </div>
            <div class="text-right">
                <p class="font-semibold text-sm" th:text="${username}">Student</p>
                <p class="text-xs text-white/60">Active Session</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white/5 p-5 rounded-xl border border-white/10 space-y-3">
                <h3 class="font-bold text-sm uppercase tracking-wider text-indigo-400">Enrolled Courses</h3>
                <div class="space-y-2 text-sm">
                    <th:block th:each="course : ${courses}">
                        <div class="p-3 bg-black/20 border-l-4 border-indigo-500 rounded-r-lg flex justify-between items-center">
                            <span class="font-semibold" th:text="${course}">Course Name</span>
                            <span class="text-xs bg-indigo-500/20 px-2 py-0.5 rounded text-indigo-300 border border-indigo-500/30">Active</span>
                        </div>
                    </th:block>
                </div>
            </div>

            <div class="bg-white/5 p-5 rounded-xl border border-white/10 flex flex-col justify-between">
                <div>
                    <h3 class="font-bold text-sm uppercase tracking-wider text-indigo-400 mb-4">User Profile</h3>
                    <div class="flex items-center gap-4">
                        <div class="w-16 h-16 rounded-full border-2 border-indigo-400 bg-slate-950 flex items-center justify-center text-2xl shadow-inner overflow-hidden">
                            <img th:if="${profilePic != null}" th:src="${profilePic}" class="w-full h-full object-cover" />
                            <span th:if="${profilePic == null}">👤</span>
                        </div>
                        <div>
                            <p class="text-lg font-bold" th:text="${username}">Username</p>
                            <p class="text-xs text-slate-400">Role: Portal Student</p>
                        </div>
                    </div>
                </div>

                <form th:action="@{/portal/upload-profile}" method="POST" enctype="multipart/form-data" class="mt-6 pt-4 border-t border-white/5 space-y-2">
                    <input type="hidden" name="username" th:value="${username}">
                    <input type="hidden" name="role" value="STUDENT">
                    <label class="block text-xs text-slate-400 uppercase tracking-wider font-semibold">Change Profile Picture</label>
                    <div class="flex gap-2">
                        <input type="file" name="photo" required class="text-xs file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 cursor-pointer">
                        <button type="submit" class="px-3 py-1 bg-white/10 hover:bg-white/20 rounded-lg text-xs font-semibold tracking-wide transition cursor-pointer">Upload</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

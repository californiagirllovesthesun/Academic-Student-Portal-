<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-image: url('https://i.postimg.cc/wBcXd70w/loginacademicpage.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #020617;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto glass-card rounded-2xl p-8 text-white shadow-2xl">
        <div class="flex justify-between items-center border-b border-white/10 pb-6 mb-6">
            <h1 class="text-2xl font-bold">🚀 STUDENT TERMINAL</h1>
            <p class="text-sm text-slate-400" th:text="${username} + ' | Active Session'"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <h2 class="text-lg font-semibold mb-4 text-indigo-400">ENROLLED COURSES</h2>
                <div class="space-y-3">
                    <div th:each="course : ${courses}" class="p-3 rounded-lg bg-white/5 border border-white/5 flex justify-between">
                        <span th:text="${course.courseName}">Course Title</span>
                        <span class="text-xs bg-indigo-600 px-2 py-1 rounded">Active</span>
                    </div>
                </div>
            </div>

            <div>
                <h2 class="text-lg font-semibold mb-4 text-indigo-400">USER PROFILE</h2>
                <form th:action="@{/portal/update-profile}" method="POST" class="space-y-4">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-16 h-16 rounded-full bg-slate-700 flex items-center justify-center text-xl">👤</div>
                        <div>
                            <p class="font-bold" th:text="${username}"></p>
                            <p class="text-xs text-slate-400">Role: Portal Student</p>
                        </div>
                    </div>
                    <input type="text" name="email" placeholder="Email Address" class="w-full p-2 rounded bg-white/5 border border-white/10">
                    <input type="text" name="phone" placeholder="Phone Number" class="w-full p-2 rounded bg-white/5 border border-white/10">
                    <button type="submit" class="w-full py-2 bg-indigo-600 rounded hover:bg-indigo-500 font-bold">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

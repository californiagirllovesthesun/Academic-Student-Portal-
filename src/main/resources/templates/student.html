<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Student Portal - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen w-screen m-0 p-0 overflow-hidden flex items-center justify-center bg-cover bg-center bg-no-repeat"
      th:style="'background-image: url(' + @{/images/login-bg.png} + ');'">

    <div class="w-full max-w-md p-8 mx-4 rounded-2xl border border-white/20 bg-white/10 backdrop-blur-md shadow-2xl text-center">
        <h1 class="text-2xl font-bold tracking-wider text-white uppercase mb-8">
            Academic Student Portal
        </h1>

        <form th:action="@{/login}" method="POST" class="space-y-6 text-left">
            <div>
                <label class="block text-sm font-medium text-white/80 mb-2">Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-white/50">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </span>
                    <input type="email" name="username" required placeholder="katiecarlson@mac.com"
                           class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white/20 transition" />
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-white/80 mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-white/50">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </span>
                    <input type="password" name="password" required placeholder="••••••••"
                           class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white/20 transition" />
                </div>
            </div>

            <button type="submit" 
                    class="w-full py-3 mt-4 font-semibold text-white bg-blue-500 rounded-xl shadow-lg hover:bg-blue-600 active:transform active:scale-[0.98] transition">
                Log In
            </button>
        </form>

        <div class="mt-6 space-y-2 text-sm text-white/70">
            <a href="#" class="block hover:text-white transition">Forgot Password?</a>
            <p>Don't have an account? <a href="#" class="font-semibold text-white hover:underline">Sign up</a></p>
        </div>
    </div>

</body>
</html>
